services:
  # Backend — Node.js API
  - type: web
    name: yt-downloader-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false   # Render dashboard dan qo'lda kiritiladi

  # Frontend — Static site (Vite build)
  - type: web
    name: yt-downloader-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # Backend URL si — Render dashboard dan kiritiladi
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
